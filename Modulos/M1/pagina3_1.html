<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPP Específico — Descripción</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    @font-face {
      font-family: 'AASmartSans';
      src: url('../Recursos/fonts/AASMARTSANS-REGULAR.TTF') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'AASmartSans';
      src: url('../Recursos/fonts/AASMARTSANS-SEMIBOLD.TTF') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'AASmartSans';
      src: url('../Recursos/fonts/AASMARTSANS-BOLD.TTF') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --blue-deep:    #031795;
      --blue-brand:   rgba(3, 23, 149, 0.9);
      --blue-sky:     #2a83df;
      --red:          #ea0606;
      --white:        #ffffff;
      --bg:           #f7fbff;
      --muted:        rgba(3, 23, 149, 0.78);
      --shadow-sm:    0 8px 24px rgba(3, 23, 149, 0.09);
      --shadow-md:    0 18px 42px rgba(3, 23, 149, 0.14);
      --radius-sm:    14px;
      --radius-md:    22px;
      --radius-lg:    30px;
      --grad-text:    linear-gradient(278deg, #7BDBFF 8.87%, #55b5da 39.24%, #3937bd 44.76%, #ea0606 54.73%, #eda3a4 100.62%);
      --font:         'AASmartSans', 'Barlow', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      background-image: url('../../Recursos/img/M1/fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      overflow: hidden;
    }

    body {
      height: 100%;
      font-family: var(--font);
      color: var(--blue-deep);
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-left: 90px;
      padding-bottom: 70px;
    }

    .page-main {
      flex: 1;
      overflow-y: auto;
      padding: clamp(10px, 2vh, 20px) clamp(15px, 3vw, 40px);
    }

    .section-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sec-header {
      text-align: center;
    }

    .sec-title {
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      background: var(--grad-text);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .s1-layout {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 30px;
      max-width: 1500px;
      margin: 0 auto;
      width: 100%;
    }

    .s1-info {
      flex: 0 0 280px;
      display: flex;
      flex-direction: column;
    }

    .glass-card {
      padding: 25px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(42, 131, 223, 0.2);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }

    .info-desc {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .btn-action {
      padding: 14px;
      background: var(--grad-text);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .btn-action:hover {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    .s1-model {
      flex: 1;
      position: relative;
    }

    .model-frame {
      width: 100%;
      height: 100%;
      min-height: 450px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: white;
      border: 1px solid rgba(42, 131, 223, 0.2);
      box-shadow: var(--shadow-md);
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 1000px) {
      .app { padding-left: 0; padding-bottom: 0; }
      .s1-layout { flex-direction: column; }
      .s1-info { flex: none; width: 100%; }
      .model-frame { min-height: 350px; }
    }
  </style>
</head>
<body>

<div class="app">
  <main class="page-main">
    <div class="section-inner">
      <header class="sec-header">
        <h1 class="sec-title">Respirador de Media Cara</h1>
      </header>

      <div class="s1-layout">
        <div class="s1-info">
          <div class="glass-card">
            <p class="info-desc">Control interactivo de los componentes del equipo de protección personal.</p>
            
            <button id="btn1" class="btn-action" onclick="toggleState(1)">Explosión</button>
            <button id="btn2" class="btn-action" onclick="toggleState(2)">Explosión 2</button>
          </div>
        </div>

        <div class="s1-model">
          <div class="model-frame">
            <iframe id="model-iframe" src="../../Complementos/MascaraV2/MascaraV2.html"></iframe>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const states = {
    1: { exploded: false, explosion: "explosion", implosion: "implosion", btn: "btn1" },
    2: { exploded: false, explosion: "explosion 2", implosion: "implosion 2", btn: "btn2" }
  };

  function toggleState(id) {
    const state = states[id];
    const btn = document.getElementById(state.btn);
    const label = id === 1 ? "Explosión" : "Explosión 2";
    const labelAlt = id === 1 ? "Implosión" : "Implosión 2";
    
    try {
      const v3dObj = window.v3d || document.getElementById("model-iframe").contentWindow.v3d;
      const procedure = state.exploded ? state.implosion : state.explosion;
      
      v3dObj.puzzles.procedures[procedure]();
      
      state.exploded = !state.exploded;
      btn.textContent = state.exploded ? labelAlt : label;
    } catch (e) {
      console.error("Error al ejecutar el procedimiento 3D:", e);
    }
  }

  // Notificar al sistema padre (opcional)
  setTimeout(() => {
    try { window.parent.continuarbtn("true"); } catch (e) {}
  }, 10000);
</script>

</body>
</html>
