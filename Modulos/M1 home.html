<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de iFrames</title>
    <style>
        @font-face {
            font-family: 'AASmartSans';
            src: url('../Recursos/fonts/AASMARTSANS-REGULAR.TTF') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'AASmartSans';
            src: url('../Recursos/fonts/AASMARTSANS-SEMIBOLD.TTF') format('truetype');
            font-weight: 600;
            font-style: normal;
        }

        @font-face {
            font-family: 'AASmartSans';
            src: url('../Recursos/fonts/AASMARTSANS-BOLD.TTF') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #contenedor-iframes {
            position: relative;
            width: 100vw;
            height: calc(100vh - 90px);
            transition: height 0.3s;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .iframe-visible {
            z-index: 2;
            opacity: 1;
        }

        .iframe-preload {
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        #indicador {
            position: fixed;
            top: 18px;
            left: 70px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #122285;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .animacion-cambio {
            animation: resalto 0.4s ease;
        }

        @keyframes resalto {
            0% { transform: scale(1); background-color: rgba(255, 255, 255, 0.95); }
            50% { transform: scale(1.15); background-color: #d0d7ed; }
            100% { transform: scale(1); background-color: rgba(255, 255, 255, 0.95); }
        }

        #barra-controles {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            z-index: 999;
            background-color: #ffffff;
            box-shadow: 0px -4px 10px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
        }

        #avatar-container {
            display: flex;
            align-items: center;
            gap: 15px;
            height: 100%;
            max-width: 60%;
        }

        #avatar-video {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #000;
            flex-shrink: 0; /* Evita que el video se encoja si el texto es muy largo */
        }

        #avatar-texto {
            font-family: 'AASmartSans', Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #122285;
            /* Modificaciones clave: */
            white-space: normal; /* Permite saltos de línea */
            word-wrap: break-word; /* Rompe palabras largas */
            overflow-y: auto; /* Agrega scroll si el texto sobrepasa el alto */
            max-height: 70px; /* Limita el alto al tamaño del avatar */
            padding-right: 5px;
            opacity: 1;
            line-height: 1.2;
        }

        /* Estilos para el scrollbar del texto del avatar para que luzca estético */
        #avatar-texto::-webkit-scrollbar {
            width: 4px;
        }
        #avatar-texto::-webkit-scrollbar-thumb {
            background-color: #d0d7ed;
            border-radius: 4px;
        }

        #botones-container {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #f8faff;
            border: 2px solid #d0d7ed;
            color: #122285;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: 800;
            font-family: 'AASmartSans', Arial, sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s, opacity 0.3s;
        }

        #btn-atras {
            width: 52px;
            height: 52px;
            padding: 0;
            border-radius: 50%;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn .icono-continuar, .btn .icono-atras {
            color: #e50000;
            font-size: 22px;
            font-weight: 900;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #indicador {
                top: 0;
                bottom: auto;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 0 0 15px 15px;
            }

            .animacion-cambio {
                animation: resalto-mobile 0.4s ease;
            }

            @keyframes resalto-mobile {
                0% { transform: translateX(-50%) scale(1); background-color: rgba(255, 255, 255, 0.95); }
                50% { transform: translateX(-50%) scale(1.15); background-color: #d0d7ed; }
                100% { transform: translateX(-50%) scale(1); background-color: rgba(255, 255, 255, 0.95); }
            }

            #barra-controles {
                padding: 0 15px;
            }
            
            #avatar-video {
                height: 50px;
                width: 50px;
            }

            #avatar-texto {
                font-size: 14px;
                max-height: 50px; /* Ajustado para móvil */
            }

            #botones-container {
                gap: 10px;
            }
            
            .btn {
                padding: 10px 25px;
                font-size: 16px;
            }

            #btn-atras {
                width: 44px;
                height: 44px;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div id="indicador">0/0</div>

    <div id="contenedor-iframes"></div>

    <div id="barra-controles">
        <div id="avatar-container">
            <video id="avatar-video" src="../Recursos/video/avatarA.mp4" loop autoplay muted playsinline></video>
            <div id="avatar-texto"></div>
        </div>
        <div id="botones-container">
            <button id="btn-atras" class="btn">
                <span class="icono-atras">&#10094;</span>
            </button>
            <button id="btn-continuar" class="btn" disabled>
                Continuar <span class="icono-continuar">&#10095;</span>
            </button>
        </div>
    </div>

<script>
    let listaUrls = [];
    let indiceActual = 0;
    let actualIframe = null;
    let preloadIframe = null;
    let audioAvatarActual = null;
    let intervaloTexto = null;
    let timeoutTexto = null;

    const contenedorIframes = document.getElementById('contenedor-iframes');
    const btnAtras = document.getElementById('btn-atras');
    const btnContinuar = document.getElementById('btn-continuar');
    const indicador = document.getElementById('indicador');
    const avatarTexto = document.getElementById('avatar-texto');

    window.avatarhtml = function(texto, audioUrl) {
        clearInterval(intervaloTexto);
        clearTimeout(timeoutTexto);
        
        avatarTexto.style.transition = 'none';
        avatarTexto.style.opacity = '1';
        // Usar textContent soluciona el problema de los espacios perdidos
        avatarTexto.textContent = ""; 
        
        // Resetear scroll si había quedado abajo
        avatarTexto.scrollTop = 0;
        
        setTimeout(() => {
            avatarTexto.style.transition = 'opacity 1.5s ease-in-out';
        }, 50);

        if (audioAvatarActual) {
            audioAvatarActual.pause();
            audioAvatarActual.currentTime = 0;
        }
        
        if (audioUrl) {
            audioAvatarActual = new Audio(audioUrl);
            
            audioAvatarActual.addEventListener('loadedmetadata', () => {
                const duracionMs = audioAvatarActual.duration * 1000;
                const tiempoPorLetra = (duracionMs * 0.8) / texto.length;
                
                let i = 0;
                intervaloTexto = setInterval(() => {
                    // Usar textContent en lugar de innerText
                    avatarTexto.textContent += texto.charAt(i);
                    // Hacer auto-scroll hacia abajo si el texto crece
                    avatarTexto.scrollTop = avatarTexto.scrollHeight;
                    i++;
                    if (i >= texto.length) {
                        clearInterval(intervaloTexto);
                    }
                }, tiempoPorLetra);

                timeoutTexto = setTimeout(() => {
                    avatarTexto.style.opacity = '0';
                }, duracionMs);
            });

            audioAvatarActual.play().catch(e => console.error(e));
        } else {
            let i = 0;
            intervaloTexto = setInterval(() => {
                // Usar textContent en lugar de innerText
                avatarTexto.textContent += texto.charAt(i);
                // Hacer auto-scroll hacia abajo si el texto crece
                avatarTexto.scrollTop = avatarTexto.scrollHeight;
                i++;
                if (i >= texto.length) {
                    clearInterval(intervaloTexto);
                }
            }, 40);

            timeoutTexto = setTimeout(() => {
                avatarTexto.style.opacity = '0';
            }, (texto.length * 40) + 2500);
        }
    };

    window.continuarbtn = function(estado) {
        if ((estado === true || estado === "true") && indiceActual < listaUrls.length - 1) {
            btnContinuar.disabled = false;
        } else {
            btnContinuar.disabled = true;
        }
    };

    const indiceGuardado = localStorage.getItem('visor_ultimo_indice');

    fetch('../Recursos/list/M1.json')
        .then(r => r.json())
        .then(d => {
            listaUrls = d.enlaces; 
            if (listaUrls.length > 0) {
                if (indiceGuardado !== null) {
                    let sugerido = parseInt(indiceGuardado);
                    if (sugerido < listaUrls.length) {
                        indiceActual = sugerido;
                    }
                }
                actualizarIframes();
            }
        })
        .catch(e => console.error(e));

    function crearIframe(url, clase) {
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.className = clase;
        iframe.allowFullscreen = true;
        contenedorIframes.appendChild(iframe);
        return iframe;
    }

    function actualizarIframes() {
        indicador.innerText = `${indiceActual + 1}/${listaUrls.length}`;
        
        indicador.classList.remove('animacion-cambio');
        void indicador.offsetWidth;
        indicador.classList.add('animacion-cambio');

        if (preloadIframe && preloadIframe.src.endsWith(listaUrls[indiceActual])) {
            if (actualIframe) actualIframe.remove();
            actualIframe = preloadIframe;
            actualIframe.className = 'iframe-visible';
            preloadIframe = null;
        } else {
            if (actualIframe) actualIframe.remove();
            if (preloadIframe) preloadIframe.remove();
            actualIframe = crearIframe(listaUrls[indiceActual], 'iframe-visible');
            preloadIframe = null;
        }

        if (indiceActual < listaUrls.length - 1) {
            preloadIframe = crearIframe(listaUrls[indiceActual + 1], 'iframe-preload');
        }

        btnContinuar.disabled = true;

        localStorage.setItem('visor_ultimo_indice', indiceActual);
        
        avatarTexto.style.transition = 'none';
        avatarTexto.style.opacity = '0';
        clearInterval(intervaloTexto);
        clearTimeout(timeoutTexto);
        if (audioAvatarActual) {
            audioAvatarActual.pause();
        }
    }

    btnAtras.addEventListener('click', () => {
        if (indiceActual > 0) {
            indiceActual--;
            actualizarIframes();
        }
    });

    btnContinuar.addEventListener('click', () => {
        if (indiceActual < listaUrls.length - 1) {
            indiceActual++;
            actualizarIframes();
        }
    });
</script>
</body>
</html>
